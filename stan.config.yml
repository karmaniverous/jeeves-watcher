stan-core:
  stanPath: .stan
  excludes:
    - docs
    - package-lock.json
  includes: []
stan-cli:
  cliDefaults:
    run:
      facets: false
      plan: false
      sequential: true
  patchOpenCommand: code -g {file}
  scripts:
    typecheck: npm run typecheck -- --noErrorTruncation
    lint:
      script: npm run lint:fix
      warnPattern: \\d+:\\d+\\s+warning
    test: npm run test -- --no-color
    diagrams: npm run diagrams --workspace=packages/service
    docs:
      script: npm run docs --workspace=packages/service -- --emit none
      warnPattern: "\\[warning\\](?!.*\\.__type\\.|.*Found \\d+ errors and \\d+ warnings)"
    build: cross-env NO_COLOR=1 npm run build
    knip:
      script: npm run knip --workspace=packages/service
      warnPattern: hints
